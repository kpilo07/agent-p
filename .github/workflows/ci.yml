# Verificación en cada push/PR: vet + tests del backend y build del frontend.
# Mantiene main en verde para poder taggear releases con confianza.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # `//go:embed all:web/dist` exige que el directorio exista al compilar.
      # vet/test no necesitan el frontend real, así que basta un stub mínimo
      # (en build/release sí se genera con pnpm).
      - name: Stub del frontend embebido
        run: mkdir -p web/dist && echo '<!doctype html><title>stub</title>' > web/dist/index.html
      - name: Vet
        run: CGO_ENABLED=0 go vet ./...
      - name: Test
        run: CGO_ENABLED=0 go test ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install
        run: cd web && pnpm install --frozen-lockfile
      - name: Typecheck
        run: cd web && pnpm exec tsc --noEmit
      - name: Build
        run: cd web && pnpm build
